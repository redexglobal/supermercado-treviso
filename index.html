<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Supermercado Trevizo - Painel de Precos</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap');
  :root {
    --azul:    #0D47C8;
    --azul-esc:#021a5e;
    --dourado: #FFD700;
    --b:       #FFFFFF;
    --b70:     rgba(255,255,255,0.7);
    --b40:     rgba(255,255,255,0.4);
    --b15:     rgba(255,255,255,0.15);
    --b08:     rgba(255,255,255,0.08);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;overflow:hidden;
    background:linear-gradient(135deg,#021a5e 0%,#0D47C8 100%);
    font-family:'Montserrat',sans-serif;color:#fff;}

  .painel{display:grid;grid-template-columns:50% 50%;height:100vh;width:100vw;}

  /* COLUNA ESQUERDA */
  .col-esq{display:grid;grid-template-rows:58% 42%;height:100vh;
    border-right:2px solid rgba(255,215,0,0.5);}

  .bloco-prod{position:relative;overflow:hidden;
    border-bottom:2px solid rgba(255,215,0,0.5);background:#021a5e;}

  .prod-img{position:absolute;inset:0;width:100%;height:100%;
    object-fit:cover;transition:opacity 0.7s ease,transform 0.7s ease;}
  .prod-img.saindo{opacity:0;transform:scale(1.07);}

  .prod-overlay{position:absolute;bottom:0;left:0;right:0;height:38%;
    background:linear-gradient(to top,rgba(2,26,94,0.88) 0%,transparent 100%);z-index:2;}

  .prod-badge{position:absolute;bottom:1rem;left:50%;transform:translateX(-50%);
    background:var(--dourado);color:#000;font-size:1rem;font-weight:900;
    padding:0.5rem 2.2rem;border-radius:50px;letter-spacing:3px;text-transform:uppercase;
    white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,0.5);z-index:3;}

  .bloco-marca{position:relative;overflow:hidden;display:flex;flex-direction:column;
    align-items:center;justify-content:flex-end;padding:0.9rem 1rem;gap:0.3rem;
    background:#021a5e;}
  .bloco-marca::after{content:'';position:absolute;inset:0;
    background:linear-gradient(to top,rgba(2,26,94,0.92) 0%,rgba(2,26,94,0.5) 55%,rgba(2,26,94,0.1) 100%);
    z-index:2;}
  .logo-bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1;}
  .marca-linha{position:absolute;top:0;left:10%;right:10%;height:1px;
    background:linear-gradient(90deg,transparent,var(--dourado),transparent);z-index:3;}
  .bloco-marca .slogan,.bloco-marca .loc,.bloco-marca .relogio,.bloco-marca .datatxt
    {position:relative;z-index:3;}
  .slogan{font-size:0.65rem;color:var(--dourado);font-weight:800;letter-spacing:2px;
    text-transform:uppercase;text-align:center;}
  .loc{font-size:0.68rem;color:var(--b70);text-align:center;font-weight:600;}
  .relogio{font-size:2.4rem;font-weight:900;color:var(--dourado);letter-spacing:5px;
    text-shadow:0 0 24px rgba(255,215,0,0.6);line-height:1;}
  .datatxt{font-size:0.72rem;color:#fff;font-weight:700;text-align:center;text-transform:capitalize;}

  /* COLUNA DIREITA */
  .col-dir{display:flex;flex-direction:column;height:100vh;overflow:hidden;
    padding:1.3rem 1.5rem;
    background:linear-gradient(160deg,#1056D0 0%,#0A35A0 45%,#021a5e 100%);
    position:relative;}
  .col-dir::before{content:'';position:absolute;top:-100px;right:-100px;
    width:340px;height:340px;border-radius:50%;
    border:50px solid rgba(255,255,255,0.04);pointer-events:none;z-index:0;}
  .col-dir::after{content:'';position:absolute;bottom:-80px;left:-80px;
    width:260px;height:260px;border-radius:50%;
    border:40px solid rgba(255,255,255,0.04);pointer-events:none;z-index:0;}
  .col-dir>*{position:relative;z-index:1;}

  .col-titulo{text-align:center;margin-bottom:0.8rem;flex-shrink:0;
    padding-bottom:0.7rem;border-bottom:1px solid var(--b40);}
  .col-titulo span{font-size:0.62rem;font-weight:800;letter-spacing:3px;
    text-transform:uppercase;color:var(--dourado);}

  .dest-hdr{display:flex;align-items:center;gap:1rem;
    background:rgba(255,255,255,0.13);border:2px solid #fff;border-radius:14px;
    padding:0.9rem 1.3rem;margin-bottom:0.7rem;flex-shrink:0;
    box-shadow:0 4px 24px rgba(0,0,0,0.2),inset 0 1px 0 rgba(255,255,255,0.2);}
  .dest-titulo{font-size:1.55rem;font-weight:900;color:#fff;letter-spacing:2px;
    line-height:1;text-transform:uppercase;text-shadow:0 2px 10px rgba(0,0,0,0.3);}
  .dest-sub{font-size:0.63rem;color:var(--dourado);font-weight:700;
    letter-spacing:1px;text-transform:uppercase;margin-top:0.15rem;}
  .dest-badge{background:var(--dourado);color:#000;font-size:0.6rem;font-weight:900;
    padding:0.3rem 0.8rem;border-radius:50px;letter-spacing:1.5px;text-transform:uppercase;
    animation:piscar 2s ease-in-out infinite;white-space:nowrap;}

  .dest-cortes{display:flex;flex-direction:column;gap:0.38rem;
    margin-bottom:0.6rem;flex-shrink:0;}
  .corte{display:flex;align-items:center;justify-content:space-between;
    background:var(--b08);border:1px solid var(--b40);border-left:4px solid #fff;
    border-radius:0 10px 10px 0;padding:0.55rem 1rem;}
  .corte-n{font-size:0.86rem;font-weight:700;color:#fff;}
  .corte-p{font-size:1.1rem;font-weight:900;color:var(--dourado);
    text-shadow:0 0 12px rgba(255,215,0,0.4);}

  .divisor{display:flex;align-items:center;gap:0.7rem;margin:0.35rem 0;flex-shrink:0;}
  .div-l{flex:1;height:1px;background:var(--b40);}
  .div-t{font-size:0.58rem;font-weight:800;color:var(--b70);
    letter-spacing:2px;text-transform:uppercase;white-space:nowrap;}

  .outros{display:flex;flex-direction:column;gap:0.28rem;overflow-y:auto;flex:1;}
  .outros::-webkit-scrollbar{width:3px;}
  .outros::-webkit-scrollbar-thumb{background:var(--b40);border-radius:3px;}
  .outro{display:flex;align-items:center;justify-content:space-between;
    padding:0.42rem 0.85rem;border-radius:10px;
    border:1px solid var(--b40);background:var(--b08);gap:0.5rem;}
  .outro-info{flex:1;min-width:0;}
  .outro-cat{font-size:0.6rem;font-weight:800;color:var(--dourado);
    text-transform:uppercase;letter-spacing:1px;display:block;}
  .outro-n{font-size:0.82rem;font-weight:700;color:#fff;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;}
  .outro-p{font-size:0.95rem;font-weight:900;color:#fff;flex-shrink:0;
    background:var(--b15);padding:0.22rem 0.65rem;border-radius:6px;
    border:1px solid var(--b40);}

  /* MARCA CRIADOR - canto inferior direito */
  .marca-criador{position:fixed;bottom:0.75rem;right:0.9rem;z-index:999;
    display:flex;align-items:center;gap:0.35rem;opacity:0.6;
    transition:opacity 0.2s;}
  .marca-criador:hover{opacity:1;}
  .marca-criador img{width:26px;height:26px;object-fit:contain;border-radius:4px;}
  .marca-criador span{font-size:0.5rem;font-weight:700;color:rgba(255,255,255,0.6);
    letter-spacing:0.8px;text-transform:uppercase;line-height:1.4;}

  @keyframes piscar{0%,100%{opacity:1;}50%{opacity:0.55;}}
  @keyframes fade-in{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
  .fi{animation:fade-in 0.4s ease forwards;}
</style>
</head>
<body>

<div class="painel">
  <div class="col-esq">
    <div class="bloco-prod">
      <img id="prod-img" class="prod-img" src="" alt="Produto"/>
      <div class="prod-overlay"></div>
      <div id="prod-badge" class="prod-badge">FRANGO</div>
    </div>
    <div class="bloco-marca">
      <div class="marca-linha"></div>
      <img src="images/logo.jpg" class="logo-bg" alt="Trevizo"/>
      <div class="slogan">Da Nossa Familia, Para a Sua</div>
      <div class="loc">Av. Sucuri, 1756 - St. Jao, Goiania - GO</div>
      <div class="relogio" id="relogio">00:00:00</div>
      <div class="datatxt" id="datatxt">--</div>
    </div>
  </div>

  <div class="col-dir">
    <div class="col-titulo"><span>Ofertas do Dia - Acougue Trevizo</span></div>
    <div class="dest-hdr">
      <div>
        <div class="dest-titulo" id="dest-titulo">FRANGO</div>
        <div class="dest-sub">Cortes frescos do dia</div>
      </div>
      <div class="dest-badge">DESTAQUE</div>
    </div>
    <div class="dest-cortes" id="dest-cortes"></div>
    <div class="divisor">
      <div class="div-l"></div>
      <div class="div-t">Outros cortes disponiveis</div>
      <div class="div-l"></div>
    </div>
    <div class="outros" id="outros"></div>
  </div>
</div>

<!-- Logo criador do sistema - canto inferior direito -->
<div class="marca-criador">
  <img src="images/marca-criador.png" alt="Redex Global" onerror="this.style.display='none'"/>
  <span>Sistema por<br/>Redex Global</span>
</div>

<script>
var P=[
  {nome:"Frango",
   img:"https://images.unsplash.com/photo-1604503468958-0db3b8b10523?w=1920&q=90&auto=format&fit=crop",
   c:[{n:"Coxa e Sobrecoxa Temperada",p:"R$ 18,99/kg"},{n:"Coxinha Temperada",p:"R$ 26,99/kg"},
      {n:"File de Peito",p:"R$ 27,99/kg"},{n:"Meio Asa Temperado",p:"R$ 33,99/kg"}]},
  {nome:"Carne de Primeira",
   img:"https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=1920&q=90&auto=format&fit=crop",
   c:[{n:"File Mignon",p:"R$ 59,99/kg"},{n:"Contrafile",p:"R$ 54,99/kg"},
      {n:"Alcatra",p:"R$ 53,99/kg"},{n:"Palominha",p:"R$ 42,99/kg"},{n:"Peixinho",p:"R$ 41,99/kg"}]},
  {nome:"Carne de Segunda",
   img:"https://images.unsplash.com/photo-1558030006-ced668df87f7?w=1920&q=90&auto=format&fit=crop",
   c:[{n:"Coxao Mole",p:"R$ 45,99/kg"},{n:"Coxao Duro",p:"R$ 44,99/kg"},{n:"Acem",p:"R$ 32,99/kg"}]},
  {nome:"Carne de Porco",
   img:"https://images.unsplash.com/photo-1594226801341-41427b4e5c22?w=1920&q=90&auto=format&fit=crop",
   c:[{n:"Pernil Suino",p:"R$ 19,99/kg"},{n:"Lombo Suino",p:"R$ 26,99/kg"},{n:"Costelinha Suina",p:"R$ 29,99/kg"}]},
  {nome:"Picanha",
   img:"https://images.unsplash.com/photo-1529692236671-f1f6cf9683ba?w=1920&q=90&auto=format&fit=crop",
   c:[{n:"Picanha Bovina",p:"R$ 79,99/kg"},{n:"Picanha Suina",p:"R$ 34,99/kg"}]},
  {nome:"Costela",
   img:"https://images.unsplash.com/photo-1544025162-052763338878?w=1920&q=90&auto=format&fit=crop",
   c:[{n:"Costela Bovina",p:"R$ 34,99/kg"},{n:"Costela Minga",p:"R$ 29,99/kg"},{n:"Costela Ripa",p:"R$ 27,99/kg"}]},
  {nome:"Linguica",
   img:"https://images.unsplash.com/photo-1542528180-1c2803fa048c?w=1920&q=90&auto=format&fit=crop",
   c:[{n:"Linguica Toscana",p:"R$ 24,99/kg"},{n:"Linguica Calabresa",p:"R$ 21,99/kg"},{n:"Linguica de Frango",p:"R$ 18,99/kg"}]}
];

var idx=0;
function render(i){
  var p=P[i];
  var img=document.getElementById("prod-img");
  var badge=document.getElementById("prod-badge");
  img.classList.add("saindo");
  setTimeout(function(){img.src=p.img;img.classList.remove("saindo");badge.textContent=p.nome.toUpperCase();},700);
  document.getElementById("dest-titulo").textContent=p.nome.toUpperCase();
  var dc=document.getElementById("dest-cortes");
  dc.innerHTML="";
  p.c.forEach(function(c){
    var el=document.createElement("div");el.className="corte fi";
    el.innerHTML='<span class="corte-n">'+c.n+'</span><span class="corte-p">'+c.p+'</span>';
    dc.appendChild(el);
  });
  var ol=document.getElementById("outros");
  ol.innerHTML="";
  P.forEach(function(op,j){
    if(j===i)return;
    op.c.forEach(function(c){
      var el=document.createElement("div");el.className="outro fi";
      el.innerHTML='<div class="outro-info"><span class="outro-cat">'+op.nome+'</span><span class="outro-n">'+c.n+'</span></div><span class="outro-p">'+c.p+'</span>';
      ol.appendChild(el);
    });
  });
}
function tick(){
  var a=new Date();
  document.getElementById("relogio").textContent=
    String(a.getHours()).padStart(2,"0")+":"+String(a.getMinutes()).padStart(2,"0")+":"+String(a.getSeconds()).padStart(2,"0");
  var dias=["domingo","segunda-feira","terca-feira","quarta-feira","quinta-feira","sexta-feira","sabado"];
  var meses=["jan","fev","mar","abr","mai","jun","jul","ago","set","out","nov","dez"];
  document.getElementById("datatxt").textContent=
    dias[a.getDay()]+", "+String(a.getDate()).padStart(2,"0")+" de "+meses[a.getMonth()]+". de "+a.getFullYear();
}
render(0);tick();
setInterval(tick,1000);
setInterval(function(){idx=(idx+1)%P.length;render(idx);},9000);
</script>
</body>
</html>
